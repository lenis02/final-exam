# 로컬 통합 실행: MLflow 서버 + 추천 서비스
# 사용:  docker compose up -d --build
#   - MLflow UI : http://localhost:5000
#   - 서비스    : http://localhost:8000  (/health, POST /predict)
# 최초 1회 모델을 이 MLflow 에 등록해야 /predict 가 동작한다 (README 참고):
#   MLFLOW_TRACKING_URI=http://localhost:5000 python -m ml.train
services:
  mlflow:
    image: weather-clothing:latest        # 같은 이미지 재사용(mlflow 동봉)
    working_dir: /mlflow
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --allowed-hosts "mlflow:5000,localhost:5000,127.0.0.1:5000,localhost,127.0.0.1"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  app:
    build: .
    image: weather-clothing:latest
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_URI: models:/weather-model@champion
    ports:
      - "8000:8000"
    depends_on:
      - mlflow

volumes:
  mlflow_data:
